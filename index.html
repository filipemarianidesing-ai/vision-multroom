<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Control PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1420;
  color:#fff;
  overflow:hidden;
}

/* ===== LAYOUT ===== */
.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#111c2b;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  padding:15px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

.radio{background:#1f7aff;}
.bell{background:#18c26e;}
.mic{background:#a45bff;}
.alert{background:#ff4c4c;}

.main{
  flex:1;
  position:relative;
  overflow:hidden;
}

/* ===== PLANTA ===== */
.map{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.1);
  transition:.1s;
}

.map img{
  width:2000px;
}

/* ===== ZONAS ===== */
.zone{
  position:absolute;
  border:1px solid rgba(255,255,255,.2);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  text-align:center;
}

.zone.active{
  animation:pulse 1.5s infinite;
}

.music{background:rgba(0,120,255,.3);}
.bellOn{background:rgba(0,255,120,.3);}
.micOn{background:rgba(180,0,255,.3);}
.alertOn{background:rgba(255,0,0,.4);}

/* ===== ANIMAÇÃO ===== */
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<button class="btn radio" id="btnRadio">📻 Rádio</button>
<button class="btn bell" id="btnBell">🔔 Campainha</button>
<button class="btn mic" id="btnMic">🎤 Microfone</button>
<button class="btn alert" id="btnAlert">🚨 Emergência</button>
</div>

<div class="main" id="mapArea">

<div class="map" id="map">
<img src="terreo.png">

<!-- ZONAS EXEMPLO -->
<div class="zone" style="left:10%;top:20%;width:15%;height:20%" data-zone="sala1">Sala 01</div>
<div class="zone" style="left:30%;top:20%;width:15%;height:20%" data-zone="sala2">Sala 02</div>
<div class="zone" style="left:55%;top:40%;width:25%;height:25%" data-zone="patio">Pátio</div>

</div>
</div>

</div>

<script>

/* ===== CONTROLE ===== */
let estado = {
  radio:false,
  campainha:false,
  microfone:false,
  emergencia:false
}

/* ===== ZONAS ===== */
function ativarZona(tipo){
  document.querySelectorAll('.zone').forEach(z=>{
    z.className='zone '+tipo+' active'
  })
}

function desligarZonas(){
  document.querySelectorAll('.zone').forEach(z=>{
    z.className='zone'
  })
}

/* ===== FUNÇÕES ===== */
function toggle(tipo){
  estado[tipo] = !estado[tipo]

  desligarZonas()

  if(estado[tipo]){
    if(tipo==='radio') ativarZona('music')
    if(tipo==='campainha') ativarZona('bellOn')
    if(tipo==='microfone') ativarZona('micOn')
    if(tipo==='emergencia') ativarZona('alertOn')
  }
}

/* ===== BOTÕES ===== */
function bind(id,tipo){
  let timer

  const btn = document.getElementById(id)

  btn.onmousedown = ()=>{
    timer = setTimeout(()=>{
      abrirConfig(tipo)
    },700)
  }

  btn.onmouseup = ()=>{
    clearTimeout(timer)
    toggle(tipo)
  }
}

bind("btnRadio","radio")
bind("btnBell","campainha")
bind("btnMic","microfone")
bind("btnAlert","emergencia")

/* ===== CONFIG ===== */
function abrirConfig(tipo){
  alert("Configurar "+tipo+"\n(volume + programação)")
}

/* ===== ZOOM ===== */
let scale=1.1
let posX=0,posY=0
let drag=false,startX,startY

const map=document.getElementById("map")

document.getElementById("mapArea").addEventListener("wheel",e=>{
  e.preventDefault()
  scale+=e.deltaY*-0.001
  scale=Math.max(.5,Math.min(3,scale))
  update()
})

document.getElementById("mapArea").addEventListener("mousedown",e=>{
  drag=true
  startX=e.clientX-posX
  startY=e.clientY-posY
})

window.addEventListener("mousemove",e=>{
  if(!drag)return
  posX=e.clientX-startX
  posY=e.clientY-startY
  update()
})

window.addEventListener("mouseup",()=>drag=false)

function update(){
  map.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`
}

</script>

</body>
</html>
