<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ética Vision Control PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
overflow:hidden;
}

/* HEADER */
.header{
padding:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
font-size:20px;
}

/* MAPA */
.map-container{
position:relative;
width:100%;
height:60vh;
overflow:hidden;
touch-action:none;
}

.map{
position:absolute;
top:0;
left:0;
transform-origin:0 0;
cursor:grab;
}

.map img{
width:1200px;
}

/* BOTÕES */
.controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-around;
}

.btn{
padding:15px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.radio{background:#2979ff;}
.campainha{background:#00c853;}
.microfone{background:#aa00ff;}
.emergencia{background:#ff1744;}

/* SLIDER VOLUME */
.volume{
position:fixed;
top:80px;
right:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
Ética Vision Control PRO
</div>

<div class="map-container" id="mapContainer">
<div class="map" id="map">
<img src="terreo.png">
</div>
</div>

<div class="controls">
<div class="btn radio" onclick="toggleRadio()" oncontextmenu="programar('radio');return false;">Rádio</div>
<div class="btn campainha" onclick="toggleCampainha()" oncontextmenu="programar('campainha');return false;">Campainha</div>
<div class="btn microfone" onclick="toggleMic()" oncontextmenu="programar('mic');return false;">Microfone</div>
<div class="btn emergencia" onclick="toggleEmergencia()" oncontextmenu="programar('emergencia');return false;">Emergência</div>
</div>

<div class="volume">
Volume<br>
<input type="range" min="0" max="100" value="50" id="volume">
</div>

<script>

/* =========================
   ZOOM + ARRASTAR PROFISSIONAL
========================= */

let scale=1;
let posX=0,posY=0;
let map=document.getElementById("map");

document.getElementById("mapContainer").addEventListener("wheel",e=>{
e.preventDefault();
scale+=e.deltaY*-0.001;
scale=Math.min(Math.max(0.5,scale),3);
update();
});

let startX,startY;
map.addEventListener("mousedown",e=>{
startX=e.clientX-posX;
startY=e.clientY-posY;
document.onmousemove=e=>{
posX=e.clientX-startX;
posY=e.clientY-startY;
update();
}
document.onmouseup=()=>document.onmousemove=null;
});

function update(){
map.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;
}

/* =========================
   SISTEMA
========================= */

let radio=false;
let campainha=false;
let mic=false;
let emergencia=false;

/* Áudio base */
let audio=new Audio();
audio.volume=0.5;

document.getElementById("volume").oninput=(e)=>{
audio.volume=e.target.value/100;
};

/* =========================
   FUNÇÕES
========================= */

function falar(texto){
let msg=new SpeechSynthesisUtterance(texto);
msg.lang="pt-BR";
speechSynthesis.speak(msg);
}

function toggleRadio(){
radio=!radio;
if(radio){
falar("Rádio escolar ativada");
audio.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
audio.play();
}else{
audio.pause();
falar("Rádio desligada");
}
}

function toggleCampainha(){
campainha=!campainha;
if(campainha){
falar("Campainha ativada");
}else{
falar("Campainha desligada");
}
}

function toggleMic(){
mic=!mic;
falar(mic?"Microfone ativo":"Microfone desligado");
}

function toggleEmergencia(){
emergencia=!emergencia;
if(emergencia){
falar("Atenção. Emergência detectada. Dirijam-se à saída.");
}else{
falar("Sistema normalizado");
}
}

/* =========================
   PROGRAMAÇÃO (segurar)
========================= */

function programar(tipo){
let texto=prompt("Digite mensagem ou horário:");
if(texto){
falar("Programação salva para "+tipo);
console.log(tipo, texto);
}
}

/* =========================
   CAMPANHA AUTOMÁTICA
========================= */

setInterval(()=>{
let agora=new Date();
let h=agora.getHours();
let m=agora.getMinutes();

if(h==7 && m==0){
falar("Início das aulas");
}

if(h==12 && m==0){
falar("Intervalo");
}

},60000);

</script>

</body>
</html>
