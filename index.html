<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ética Vision Control</title>
  <style>
    :root{
      --bg:#08111b;
      --panel:#0f1b2a;
      --panel-2:#132337;
      --line:rgba(255,255,255,.08);
      --text:#f2f7ff;
      --muted:#a9b7c8;
      --blue:#1f7aff;
      --green:#18c26e;
      --purple:#a45bff;
      --red:#ff4c4c;
      --shadow:0 18px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(160deg,#071019,#0b1624);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns:260px 1fr;
      gap:10px;
      height:100vh;
      padding:10px;
    }

    .sidebar,.main{
      background:linear-gradient(180deg,var(--panel),#0b1420);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .sidebar{
      padding:14px;
      display:grid;
      grid-template-rows:auto auto auto 1fr;
      gap:10px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }

    .logo{
      width:46px;
      height:46px;
      border-radius:14px;
      background:linear-gradient(145deg,#1f7aff,#19d2ff);
      box-shadow:0 0 22px rgba(31,122,255,.3);
      flex:0 0 46px;
    }

    .brand h1{
      margin:0;
      font-size:18px;
      line-height:1;
    }

    .brand p{
      margin:4px 0 0;
      font-size:11px;
      color:var(--muted);
      font-weight:700;
    }

    .navBtn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:16px;
      text-align:left;
      font-size:15px;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }

    .navBtn:hover{filter:brightness(1.06)}

    .panelCard{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:12px;
    }

    .panelCard .k{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:var(--muted);
      font-weight:900;
      margin-bottom:8px;
    }

    .panelCard h3{
      margin:0 0 10px;
      font-size:15px;
    }

    select{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#101a27;
      color:#fff;
      font-size:14px;
    }

    .quickGrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-top:10px;
    }

    .qBtn{
      border:none;
      border-radius:12px;
      padding:10px 8px;
      color:#fff;
      font-weight:800;
      cursor:pointer;
      font-size:12px;
    }

    .music{background:linear-gradient(145deg,var(--blue),#1557bf)}
    .bell{background:linear-gradient(145deg,var(--green),#0f8d4f)}
    .mic{background:linear-gradient(145deg,var(--purple),#6d2cdb)}
    .alert{background:linear-gradient(145deg,var(--red),#c22f2f)}
    .off{background:linear-gradient(145deg,#6f7a86,#56606b)}

    .stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-top:10px;
    }

    .stat{
      border-radius:12px;
      padding:10px;
      text-align:center;
      font-size:12px;
      font-weight:800;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
    }

    .main{
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      min-width:0;
    }

    .topBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#162538,#101b29);
    }

    .topBar h2{
      margin:0;
      font-size:18px;
    }

    .topBar p{
      margin:4px 0 0;
      font-size:11px;
      color:var(--muted);
      font-weight:700;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      padding:8px 12px;
      border-radius:999px;
      background:#182434;
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .subBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      padding:8px 12px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#132132,#0f1826);
    }

    .subActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .subBtn{
      border:none;
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      color:#fff;
      background:#182434;
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
    }

    .stage{
      position:relative;
      margin:6px;
      border-radius:18px;
      overflow:hidden;
      background:linear-gradient(180deg,#d7dde4,#cfd6dd);
      min-height:0;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
      cursor:grab;
      touch-action:none;
    }

    .stage.dragging{cursor:grabbing}

    .canvas{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(1);
      transform-origin:center center;
      user-select:none;
      transition:transform .2s ease;
    }

    .plan{
      width:1700px;
      height:auto;
      display:block;
      pointer-events:none;
      filter:none;
      image-rendering:auto;
    }

    .overlay{
      position:absolute;
      inset:0;
    }

    .zone{
      position:absolute;
      border-radius:16px;
      border:2px solid rgba(255,255,255,.18);
      background:transparent;
      overflow:hidden;
      transition:.2s ease;
    }

    .zone:hover{
      transform:scale(1.01);
    }

    .zone.selected{
      outline:3px solid rgba(255,255,255,.95);
    }

    .zoneLabel{
      position:absolute;
      left:7px;
      top:7px;
      max-width:calc(100% - 14px);
      padding:6px 9px;
      border-radius:10px;
      background:rgba(8,16,27,.82);
      color:#fff;
      font-size:10px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .zoneIcon{
      position:absolute;
      right:8px;
      bottom:8px;
      width:34px;
      height:34px;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-size:17px;
      background:rgba(8,16,27,.82);
      border:1px solid rgba(255,255,255,.1);
      color:#fff;
      opacity:0;
      transform:scale(.8);
      transition:.2s ease;
    }

    .zone.active .zoneIcon{
      opacity:1;
      transform:scale(1);
    }

    .zone.music{
      background:rgba(31,122,255,.18);
      box-shadow:0 0 0 2px rgba(31,122,255,.22),0 0 18px rgba(31,122,255,.18);
    }

    .zone.bell{
      background:rgba(24,194,110,.18);
      box-shadow:0 0 0 2px rgba(24,194,110,.22),0 0 18px rgba(24,194,110,.18);
    }

    .zone.mic{
      background:rgba(164,91,255,.18);
      box-shadow:0 0 0 2px rgba(164,91,255,.22),0 0 18px rgba(164,91,255,.18);
    }

    .zone.alert{
      background:rgba(255,76,76,.20);
      box-shadow:0 0 0 2px rgba(255,76,76,.24),0 0 20px rgba(255,76,76,.22);
    }

    .bottomBar{
      display:flex;
      gap:10px;
      padding:10px 12px;
      border-top:1px solid var(--line);
      background:linear-gradient(180deg,#101b29,#0c1520);
    }

    .bigBtn{
      flex:1;
      border:none;
      border-radius:16px;
      padding:15px;
      color:#fff;
      font-weight:900;
      font-size:15px;
      cursor:pointer;
    }

    .floatMenu{
      position:fixed;
      display:none;
      z-index:50;
      min-width:200px;
      padding:10px;
      border-radius:18px;
      background:linear-gradient(180deg,#162638,#101824);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:var(--shadow);
      gap:8px;
    }

    .floatMenu.show{display:grid}

    .floatTitle{
      font-size:12px;
      font-weight:900;
      color:#d8e7f7;
      padding:2px 4px 6px;
    }

    .floatBtn{
      border:none;
      border-radius:12px;
      padding:12px 10px;
      text-align:left;
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(6,11,17,.7);
      z-index:60;
      padding:20px;
    }

    .modal.show{display:flex}

    .modalCard{
      width:min(700px,100%);
      border-radius:22px;
      overflow:hidden;
      background:linear-gradient(180deg,#162638,#101824);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:var(--shadow);
    }

    .modalHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      background:linear-gradient(180deg,#20344a,#172638);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .modalHead h3{margin:0;font-size:18px}

    .closeBtn{
      width:38px;
      height:38px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .modalBody{
      padding:16px;
      display:grid;
      gap:14px;
    }

    textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
    }

    @media (max-width: 900px){
      body{overflow:auto}
      .app{
        grid-template-columns:1fr;
        height:auto;
        min-height:100vh;
      }
      .sidebar{order:2}
      .main{order:1;min-height:80vh}
      .topBar{flex-direction:column;align-items:flex-start}
      .chips{justify-content:flex-start}
      .bottomBar{flex-wrap:wrap}
      .bigBtn{min-width:calc(50% - 5px)}
      .plan{width:1350px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Ética Vision Control</h1>
          <p>Versão limpa · by Filipe Mariani</p>
        </div>
      </div>

      <button class="navBtn" onclick="modoAula()">🔔 Campainha</button>
      <button class="navBtn" onclick="openMsg()">💬 Mensagens</button>
      <button class="navBtn" onclick="modoMusica()">📻 Rádio Escola</button>
      <button class="navBtn" onclick="silenciarTudo()">🔇 Silenciar tudo</button>

      <div class="panelCard">
        <div class="k">Operação guiada</div>
        <h3>Escolha o ambiente</h3>
        <select id="envSelect" onchange="syncSelectedEnv(this.value)"></select>

        <div class="quickGrid">
          <button class="qBtn music" onclick="aplicarFonteRapida('music')">📻 Rádio</button>
          <button class="qBtn bell" onclick="aplicarFonteRapida('bell')">🔔 Campainha</button>
          <button class="qBtn mic" onclick="aplicarFonteRapida('mic')">🎤 Microfone</button>
          <button class="qBtn alert" onclick="aplicarFonteRapida('alert')">🚨 Emergência</button>
        </div>

        <div class="stats">
          <div class="stat" id="musicStat">Rádio: 0</div>
          <div class="stat" id="bellStat">Campainha: 0</div>
          <div class="stat" id="micStat">Microfone: 0</div>
          <div class="stat" id="offStat">Desligado: 0</div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topBar">
        <div>
          <h2>Ética Vision Control PRO</h2>
          <p>Base limpa · estável · pronta para crescer</p>
        </div>
        <div class="chips">
          <div class="chip" id="selectedChip">Ambiente: Nenhum</div>
          <div class="chip" id="sceneChip">Cena: Operação normal</div>
        </div>
      </div>

      <div class="subBar">
        <div class="subActions">
          <button class="subBtn" onclick="setFloor('terreo')">Térreo</button>
          <button class="subBtn" onclick="setFloor('superior')">Pavimento Superior</button>
          <button class="subBtn" onclick="zoomOut()">− Zoom</button>
          <button class="subBtn" onclick="zoomIn()">+ Zoom</button>
          <button class="subBtn" onclick="resetView()">Centralizar</button>
        </div>
        <div class="chip" id="floorChip">Térreo</div>
      </div>

      <div class="stage" id="stage">
        <div class="canvas" id="canvas">
          <img class="plan" id="planImg" src="terreo.png" alt="Planta">
          <div class="overlay" id="overlay"></div>
        </div>
      </div>

      <div class="bottomBar">
        <button class="bigBtn music" onclick="modoMusica()">🎵 Música Ambiente</button>
        <button class="bigBtn bell" onclick="modoAula()">🔔 Campainha</button>
        <button class="bigBtn mic" onclick="modoEvento()">🎤 Microfone</button>
        <button class="bigBtn alert" onclick="modoEmergencia()">🚨 Emergência</button>
        <button class="bigBtn off" onclick="silenciarTudo()">🔇 Silenciar</button>
      </div>
    </main>
  </div>

  <div class="floatMenu" id="floatMenu">
    <div class="floatTitle" id="floatTitle">Selecionar fonte</div>
    <button class="floatBtn music" onclick="applyFromMenu('music')">📻 Rádio Escola</button>
    <button class="floatBtn bell" onclick="applyFromMenu('bell')">🔔 Campainha</button>
    <button class="floatBtn mic" onclick="applyFromMenu('mic')">🎤 Microfone</button>
    <button class="floatBtn alert" onclick="applyFromMenu('alert')">🚨 Emergência</button>
    <button class="floatBtn off" onclick="applyFromMenu('off')">⏹ Desligar</button>
  </div>

  <div class="modal" id="msgModal">
    <div class="modalCard">
      <div class="modalHead">
        <h3>Mensagem por voz</h3>
        <button class="closeBtn" onclick="closeMsg()">×</button>
      </div>
      <div class="modalBody">
        <textarea id="msgText" placeholder="Digite a mensagem..."></textarea>
        <button class="bigBtn music" onclick="falarMensagem()">🔊 Falar mensagem</button>
      </div>
    </div>
  </div>

  <script>
    const floorImages = {
      terreo: 'terreo.png',
      superior: 'superior.png'
    };

    const floorMaps = {
      terreo: [
        {id:'entrada', name:'Entrada', x:34.6, y:2.0, w:29.0, h:9.2},
        {id:'sala02', name:'Sala 02', x:2.9, y:16.8, w:13.9, h:28.2},
        {id:'planejamento', name:'Sala de Planejamento', x:3.0, y:46.1, w:7.8, h:12.0},
        {id:'corredorTerreo', name:'Corredor Térreo', x:10.9, y:43.8, w:18.1, h:14.0},
        {id:'sala01', name:'Sala 01', x:3.0, y:59.2, w:13.9, h:28.0},
        {id:'aee', name:'AEE', x:16.9, y:59.2, w:8.5, h:28.0},
        {id:'almox', name:'Almoxarifado', x:16.9, y:16.8, w:6.8, h:28.2},
        {id:'patioAlimentacao', name:'Pátio Alimentação', x:23.8, y:16.8, w:26.4, h:44.9},
        {id:'cozinha', name:'Cozinha', x:50.3, y:16.8, w:11.9, h:27.5},
        {id:'biblioteca', name:'Biblioteca', x:62.3, y:16.8, w:12.8, h:27.5},
        {id:'coordenacao', name:'Coordenação', x:49.2, y:57.2, w:8.6, h:16.4},
        {id:'secretaria', name:'Secretaria', x:57.8, y:57.2, w:8.0, h:23.0},
        {id:'arquivoTerreo', name:'Arquivo Permanente', x:65.8, y:57.2, w:7.2, h:23.0},
        {id:'professores', name:'Sala dos Professores', x:73.0, y:57.2, w:7.5, h:23.0},
        {id:'patioExterno', name:'Pátio Externo', x:78.2, y:11.2, w:19.0, h:53.8}
      ],
      superior: [
        {id:'sala04', name:'Sala 04', x:5.0, y:10.4, w:15.6, h:28.0},
        {id:'sala05', name:'Sala 05', x:20.8, y:10.4, w:15.6, h:28.0},
        {id:'sala06', name:'Sala 06', x:36.7, y:10.4, w:17.6, h:28.0},
        {id:'sala07', name:'Sala 07', x:54.5, y:10.4, w:17.6, h:28.0},
        {id:'sala08', name:'Sala 08', x:72.3, y:10.4, w:16.9, h:28.0},
        {id:'arquivoSup', name:'Arquivo Permanente', x:5.0, y:40.0, w:11.7, h:13.5},
        {id:'corredorSup', name:'Corredor Pavimento Superior', x:16.8, y:40.0, w:57.0, h:13.5},
        {id:'apoio', name:'Sala de Apoio', x:74.0, y:40.0, w:15.0, h:13.5},
        {id:'sala03', name:'Sala 03', x:5.0, y:55.3, w:15.8, h:27.6},
        {id:'auditorio', name:'Auditório', x:20.9, y:55.3, w:26.4, h:27.6},
        {id:'sala10', name:'Sala 10', x:53.7, y:55.3, w:15.0, h:27.6},
        {id:'sala09', name:'Sala 09', x:72.9, y:55.3, w:16.2, h:27.6}
      ]
    };

    let currentFloor = 'terreo';
    let selectedEnv = '';
    let menuEnv = '';
    let panX = 0, panY = 20, zoom = 1.0;
    let dragging = false, sx = 0, sy = 0, spx = 0, spy = 0;
    const zoneStates = {};

    const stage = document.getElementById('stage');
    const canvas = document.getElementById('canvas');
    const planImg = document.getElementById('planImg');
    const overlay = document.getElementById('overlay');
    const envSelect = document.getElementById('envSelect');

    function setScene(text){
      document.getElementById('sceneChip').textContent = `Cena: ${text}`;
    }

    function getName(id){
      const item = Object.values(floorMaps).flat().find(i => i.id === id);
      return item ? item.name : id;
    }

    function iconFor(mode){
      return mode === 'music' ? '📻' :
             mode === 'bell' ? '🔔' :
             mode === 'mic' ? '🎤' :
             mode === 'alert' ? '🚨' : '⏹';
    }

    function renderSelect(){
      envSelect.innerHTML = '<option value="">Selecione o ambiente</option>';
      floorMaps[currentFloor].forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.id;
        opt.textContent = item.name;
        envSelect.appendChild(opt);
      });
      envSelect.value = selectedEnv;
    }

    function renderFloor(){
      planImg.src = floorImages[currentFloor];
      document.getElementById('floorChip').textContent = currentFloor === 'terreo' ? 'Térreo' : 'Pavimento Superior';
      overlay.innerHTML = '';

      floorMaps[currentFloor].forEach(item => {
        if(!(item.id in zoneStates)) zoneStates[item.id] = 'off';

        const zone = document.createElement('div');
        zone.className = `zone ${zoneStates[item.id]} ${zoneStates[item.id] !== 'off' ? 'active' : ''}`;
        zone.dataset.zone = item.id;
        zone.style.left = item.x + '%';
        zone.style.top = item.y + '%';
        zone.style.width = item.w + '%';
        zone.style.height = item.h + '%';
        zone.innerHTML = `<div class="zoneLabel">${item.name}</div><div class="zoneIcon">${iconFor(zoneStates[item.id])}</div>`;
        zone.onclick = e => {
          selectedEnv = item.id;
          menuEnv = item.id;
          refreshSelection();
          openFloatMenu(e.clientX, e.clientY, item.name);
        };
        overlay.appendChild(zone);
      });

      renderSelect();
      refreshSelection();
      updateStats();
    }

    function refreshSelection(){
      document.getElementById('selectedChip').textContent = `Ambiente: ${selectedEnv ? getName(selectedEnv) : 'Nenhum'}`;
      document.querySelectorAll('.zone').forEach(z => z.classList.toggle('selected', z.dataset.zone === selectedEnv));
    }

    function syncSelectedEnv(value){
      selectedEnv = value;
      refreshSelection();
    }

    function setZoneMode(id, mode){
      zoneStates[id] = mode;
      const el = document.querySelector(`.zone[data-zone="${id}"]`);
      if(el){
        el.className = `zone ${mode} ${mode !== 'off' ? 'active' : ''}`;
        el.querySelector('.zoneIcon').textContent = iconFor(mode);
      }
      updateStats();
    }

    function applyFromMenu(mode){
      if(!menuEnv) return;
      setZoneMode(menuEnv, mode);
      setScene(`Comando em ${getName(menuEnv)}`);
      closeFloatMenu();
    }

    function aplicarFonteRapida(mode){
      if(!selectedEnv){
        alert('Selecione um ambiente na planta.');
        return;
      }
      setZoneMode(selectedEnv, mode);
      setScene(`Comando em ${getName(selectedEnv)}`);
    }

    function idsByNames(names){
      return Object.values(floorMaps).flat().filter(i => names.includes(i.name)).map(i => i.id);
    }

    function resetAll(){
      Object.keys(zoneStates).forEach(k => zoneStates[k] = 'off');
      renderFloor();
    }

    function modoMusica(){
      resetAll();
      idsByNames(['Pátio Alimentação','Pátio Externo','Corredor Térreo','Corredor Pavimento Superior']).forEach(id => zoneStates[id] = 'music');
      renderFloor();
      setScene('Modo recreio');
    }

    function modoAula(){
      resetAll();
      idsByNames(['Sala 01','Sala 02','Sala 03','Sala 04','Sala 05','Sala 06','Sala 07','Sala 08','Sala 09','Sala 10']).forEach(id => zoneStates[id] = 'bell');
      renderFloor();
      setScene('Início de aula');
    }

    function modoEvento(){
      resetAll();
      idsByNames(['Auditório','Coordenação']).forEach(id => zoneStates[id] = 'mic');
      renderFloor();
      setScene('Evento institucional');
    }

    function modoEmergencia(){
      Object.keys(zoneStates).forEach(id => zoneStates[id] = 'alert');
      renderFloor();
      setScene('Emergência ativa');
    }

    function silenciarTudo(){
      Object.keys(zoneStates).forEach(id => zoneStates[id] = 'off');
      renderFloor();
      setScene('Sistema silenciado');
    }

    function updateStats(){
      const vals = Object.values(zoneStates);
      document.getElementById('musicStat').textContent = `Rádio: ${vals.filter(v => v === 'music').length}`;
      document.getElementById('bellStat').textContent = `Campainha: ${vals.filter(v => v === 'bell').length}`;
      document.getElementById('micStat').textContent = `Microfone: ${vals.filter(v => v === 'mic').length}`;
      document.getElementById('offStat').textContent = `Desligado: ${vals.filter(v => v === 'off').length}`;
    }

    function applyTransform(){
      canvas.style.transform = `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${zoom})`;
    }

    function zoomIn(){
      zoom = Math.min(3, zoom + 0.1);
      applyTransform();
    }

    function zoomOut(){
      zoom = Math.max(0.6, zoom - 0.1);
      applyTransform();
    }

    function resetView(){
      panX = 0;
      panY = 20;
      zoom = 1.0;
      applyTransform();
    }

    function setFloor(floor){
      currentFloor = floor;
      renderFloor();
    }

    stage.addEventListener('pointerdown', e => {
      if(e.target.closest('.zone')) return;
      dragging = true;
      stage.classList.add('dragging');
      sx = e.clientX;
      sy = e.clientY;
      spx = panX;
      spy = panY;
    });

    window.addEventListener('pointermove', e => {
      if(!dragging) return;
      panX = spx + (e.clientX - sx);
      panY = spy + (e.clientY - sy);
      applyTransform();
    });

    window.addEventListener('pointerup', () => {
      dragging = false;
      stage.classList.remove('dragging');
    });

    stage.addEventListener('wheel', e => {
      e.preventDefault();
      zoom += e.deltaY > 0 ? -0.08 : 0.08;
      zoom = Math.max(0.6, Math.min(3, zoom));
      applyTransform();
    }, { passive:false });

    function openFloatMenu(x,y,title){
      const m = document.getElementById('floatMenu');
      document.getElementById('floatTitle').textContent = title;
      m.style.left = Math.min(x + 10, window.innerWidth - 220) + 'px';
      m.style.top = Math.min(y + 10, window.innerHeight - 320) + 'px';
      m.classList.add('show');
    }

    function closeFloatMenu(){
      document.getElementById('floatMenu').classList.remove('show');
    }

    document.addEventListener('click', e => {
      const m = document.getElementById('floatMenu');
      if(m.classList.contains('show') && !m.contains(e.target) && !e.target.closest('.zone')) closeFloatMenu();
    });

    function openMsg(){
      document.getElementById('msgModal').classList.add('show');
    }

    function closeMsg(){
      document.getElementById('msgModal').classList.remove('show');
    }

    function falarMensagem(){
      const txt = document.getElementById('msgText').value;
      if(!txt){
        alert('Digite uma mensagem');
        return;
      }
      const u = new SpeechSynthesisUtterance(txt);
      u.lang = 'pt-BR';
      speechSynthesis.speak(u);
      setScene('Mensagem em demonstração');
    }

    document.getElementById('msgModal').addEventListener('click', e => {
      if(e.target === e.currentTarget) closeMsg();
    });

    renderFloor();
    applyTransform();
  </script>
</body>
</html>
