<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariani Vision Control</title>

<style>
body{
  margin:0;
  background:#08111b;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

#app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:90px;
  background:#0b1f2f;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding-top:20px;
}

.sidebar button{
  width:60px;
  height:60px;
  border:none;
  border-radius:15px;
  background:#102a3d;
  color:white;
  font-size:20px;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:10px;
  background:#0e2a3d;
  display:flex;
  justify-content:space-between;
}

.planta{
  flex:1;
  overflow:hidden;
  position:relative;
  touch-action:none;
}

.planta img{
  position:absolute;
  left:0;
  top:0;
  width:100%;
}

.zona{
  position:absolute;
  border:2px solid rgba(0,200,255,0.5);
  border-radius:10px;
}

.bottom{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#0e2a3d;
}

</style>
</head>

<body>

<div id="app">

<div class="sidebar">
<button onclick="acao('radio')">📻</button>
<button onclick="acao('campainha')">🔔</button>
<button onclick="acao('mic')">🎤</button>
<button onclick="emergencia()">🚨</button>
</div>

<div class="main">

<div class="header">
<h2 id="titulo">Mariani</h2>
<div>
<button onclick="trocar('terreo')">Térreo</button>
<button onclick="trocar('superior')">Superior</button>
</div>
</div>

<div class="planta" id="planta"></div>

<div class="bottom">
<button onclick="acao('radio')">Rádio</button>
<button onclick="acao('campainha')">Campainha</button>
<button onclick="acao('mic')">Microfone</button>
<button onclick="emergencia()">Emergência</button>
</div>

</div>
</div>

<script>

let config;
let zoom = 1;
let pos = {x:0,y:0};
let modo = "terreo";

fetch("config.json")
.then(r=>r.json())
.then(data=>{
  config = data;
  document.getElementById("titulo").innerText = config.appName;
  carregar();
});

function carregar(){
  const planta = document.getElementById("planta");
  planta.innerHTML = "";

  const floor = config.floors[modo];

  const img = document.createElement("img");
  img.src = floor.image;
  img.style.transform = `translate(${pos.x}px,${pos.y}px) scale(${zoom})`;
  planta.appendChild(img);

  floor.zones.forEach(z=>{
    const el = document.createElement("div");
    el.className="zona";
    el.style.left = z.x+"%";
    el.style.top = z.y+"%";
    el.style.width = z.w+"%";
    el.style.height = z.h+"%";

    el.onclick=()=>acao(z.name);
    el.oncontextmenu=(e)=>{
      e.preventDefault();
      programar(z.name);
    }

    planta.appendChild(el);
  });
}

function trocar(m){
  modo=m;
  carregar();
}

function acao(nome){
  falar(nome+" ativado");
}

function programar(nome){
  alert("Programação de "+nome);
}

function falar(txt){
  let msg = new SpeechSynthesisUtterance(txt);
  msg.lang="pt-BR";
  speechSynthesis.speak(msg);
}

function emergencia(){
  falar("Atenção emergência detectada evacuar o local");
  document.body.style.background="red";
}

</script>

</body>
</html>
