<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Multiroom PRO</title>
  <style>
    :root{
      --bg:#08131f;
      --panel:#102233;
      --panel2:#13283b;
      --line:rgba(255,255,255,.10);
      --text:#eef6ff;
      --muted:#b7c7d8;
      --blue:#159dff;
      --green:#28c76f;
      --orange:#ff8a1d;
      --red:#ff3b30;
      --purple:#5f48ff;
      --cyan:#16c6d8;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(21,157,255,.18), transparent 20%),
        radial-gradient(circle at bottom right, rgba(95,72,255,.16), transparent 22%),
        linear-gradient(160deg,#07111b,#0b1826 55%,#0f2031);
      color:var(--text);
      min-height:100vh;
      padding:14px;
    }

    .app{
      max-width:1400px;
      margin:0 auto;
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      overflow:hidden;
      background:rgba(8,19,31,.96);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:18px 22px;
      background:linear-gradient(180deg,#17324a,#12283c);
      border-bottom:1px solid var(--line);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:50px;
      height:50px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%, #1fd2ff, transparent 28%),
        radial-gradient(circle at 70% 70%, #003d9f, transparent 34%),
        linear-gradient(145deg, #0e4673, #0b2238);
      position:relative;
      box-shadow:0 0 18px rgba(21,157,255,.25);
    }

    .logo::after{
      content:"";
      position:absolute;
      inset:9px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.7);
      border-top-color:transparent;
      transform:rotate(30deg);
    }

    .brand h1{
      margin:0;
      font-size:20px;
      font-weight:800;
      letter-spacing:.5px;
    }

    .brand small{
      display:block;
      color:#d6e6f7;
      margin-top:3px;
      font-size:13px;
      font-weight:700;
    }

    .top-info{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      font-size:13px;
      font-weight:700;
    }

    .chip.online{background:rgba(40,199,111,.18); color:#c6f4d7}
    .chip.scene{background:rgba(21,157,255,.16); color:#d9efff}

    .content{
      display:grid;
      grid-template-columns:230px 1fr;
      gap:16px;
      padding:16px;
    }

    .sidebar{
      background:linear-gradient(180deg,#122536,#0d1d2d);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .sidebtn{
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      color:#fff;
      padding:16px 14px;
      font-size:18px;
      font-weight:700;
      text-align:left;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
    }

    .sidebtn:hover{filter:brightness(1.08)}
    .sideicon{
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      font-size:22px;
      flex:0 0 auto;
    }

    .main{
      background:linear-gradient(180deg,#102233,#0b1b2a);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
    }

    .main-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .main-head h2{
      margin:0;
      font-size:18px;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .stat{
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      font-size:13px;
      font-weight:700;
    }

    .map-wrap{
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        linear-gradient(145deg,#294359,#12283b);
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      padding:14px;
      min-height:500px;
    }

    .school{
      position:relative;
      min-height:470px;
      border-radius:16px;
      overflow:hidden;
      background:
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(145deg,#8f8c7a,#c3b8a3 40%,#9b907d);
      background-size:28px 28px, 28px 28px, auto;
      border:6px solid #dfe6ea;
      box-shadow:inset 0 0 0 2px rgba(0,0,0,.08);
    }

    .zone{
      position:absolute;
      border-radius:10px;
      border:3px solid rgba(255,255,255,.85);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:800;
      font-size:18px;
      color:white;
      cursor:pointer;
      overflow:hidden;
      transition:.18s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .zone:hover{transform:scale(1.02)}
    .zone.blue{background:linear-gradient(145deg,#2196f3,#1565c0)}
    .zone.green{background:linear-gradient(145deg,#3ac76d,#1d9f4d)}
    .zone.orange{background:linear-gradient(145deg,#ff9738,#e46f10)}
    .zone.red{background:linear-gradient(145deg,#ef5350,#d72f2f)}
    .zone.sand{background:linear-gradient(145deg,#d7a35d,#ad7234)}

    .zone.active-music{
      box-shadow:0 0 0 4px rgba(21,157,255,.30),0 0 22px rgba(21,157,255,.45);
    }

    .zone.active-mic{
      box-shadow:0 0 0 4px rgba(255,59,48,.30),0 0 22px rgba(255,59,48,.48);
    }

    .icon-badge{
      position:absolute;
      width:62px;
      height:62px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#fff;
      font-size:30px;
      right:16px;
      top:16px;
      border:3px solid rgba(255,255,255,.75);
      box-shadow:0 10px 20px rgba(0,0,0,.25);
    }

    .music-badge{background:linear-gradient(145deg,#19b5ff,#005bcc)}
    .mic-badge{background:linear-gradient(145deg,#ff7438,#d62d0a)}
    .bell-badge{background:linear-gradient(145deg,#18c2d8,#0077a9)}

    .footer{
      display:grid;
      grid-template-columns:220px 1fr;
      gap:16px;
      padding:0 16px 16px;
    }

    .clockbox,
    .actions{
      background:linear-gradient(180deg,#102233,#0b1b2a);
      border:1px solid var(--line);
      border-radius:20px;
    }

    .clockbox{
      padding:18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:110px;
    }

    .time{
      font-size:42px;
      font-weight:900;
      line-height:1;
      margin-bottom:8px;
    }

    .date{
      color:var(--muted);
      font-size:15px;
      font-weight:700;
    }

    .actions{
      padding:14px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    .action{
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:16px;
      font-weight:800;
      padding:18px 12px;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,.18);
    }

    .recreio{background:linear-gradient(145deg,#6d49ff,#4f2fe7)}
    .emergencia{background:linear-gradient(145deg,#ff4f42,#db2218)}
    .musica{background:linear-gradient(145deg,#16c6d8,#0896a5)}
    .silenciar{background:linear-gradient(145deg,#5f6b7a,#3f4a58)}

    .legend{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .legend span{
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
    }

    .dot{
      width:11px;height:11px;border-radius:50%;
      display:inline-block;
    }

    .blue-dot{background:#19b5ff}
    .red-dot{background:#ff4f42}
    .green-dot{background:#28c76f}

    @media (max-width: 980px){
      .content,.footer{grid-template-columns:1fr}
      .actions{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width: 700px){
      .content{padding:10px}
      .footer{padding:0 10px 10px}
      .actions{grid-template-columns:1fr}
      .topbar{padding:14px}
      .school{min-height:620px}
      .zone{font-size:15px}
      .icon-badge{width:52px;height:52px;font-size:24px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>VISION MULTIROOM</h1>
          <small>by Ética Educativos</small>
        </div>
      </div>
      <div class="top-info">
        <div class="chip online">● Sistema Online</div>
        <div class="chip scene" id="sceneText">Modo: Operação normal</div>
      </div>
    </div>

    <div class="content">
      <div class="sidebar">
        <button class="sidebtn" onclick="acaoLateral('Campainha acionada')"><span class="sideicon">🔔</span>Campainha</button>
        <button class="sidebtn" onclick="acaoLateral('Mensagens abertas')"><span class="sideicon">💬</span>Mensagens</button>
        <button class="sidebtn" onclick="acaoLateral('Rádio Escola ativada')"><span class="sideicon">📻</span>Rádio Escola</button>
        <button class="sidebtn" onclick="acaoLateral('Horários exibidos')"><span class="sideicon">🕒</span>Horários</button>
      </div>

      <div class="main">
        <div class="main-head">
          <h2>Mapa interativo da unidade escolar</h2>
          <div class="stats">
            <div class="stat" id="statMusic">Música: 0 zonas</div>
            <div class="stat" id="statMic">Microfone: 0 zonas</div>
            <div class="stat">Perfil: Premium</div>
          </div>
        </div>

        <div class="map-wrap">
          <div class="school" id="school">
            <div class="zone blue" data-zone="salas" style="left:4%;top:4%;width:40%;height:31%;" onclick="toggleZone(this,'music')">
              Salas de Aula
              <div class="icon-badge music-badge">♫</div>
            </div>

            <div class="zone green" data-zone="patio" style="left:47%;top:4%;width:33%;height:31%;" onclick="toggleZone(this,'music')">
              Pátio
              <div class="icon-badge music-badge">♫</div>
            </div>

            <div class="zone sand" data-zone="direcao" style="left:80.5%;top:4%;width:15.5%;height:31%;" onclick="toggleZone(this,'mic')">
              Direção
              <div class="icon-badge mic-badge">🎤</div>
            </div>

            <div class="zone red" data-zone="auditorio" style="left:40%;top:46%;width:27%;height:25%;" onclick="toggleZone(this,'music')">
              Auditório
            </div>

            <div class="zone orange" data-zone="recepcao" style="left:69%;top:46%;width:27%;height:25%;" onclick="toggleZone(this,'mic')">
              Recepção
            </div>

            <div class="zone sand" data-zone="entrada" style="left:4%;top:72%;width:18%;height:18%;" onclick="toggleZone(this,'bell')">
              Entrada
              <div class="icon-badge bell-badge">🔊</div>
            </div>
          </div>

          <div class="legend">
            <span><i class="dot blue-dot"></i> Música ambiente</span>
            <span><i class="dot red-dot"></i> Microfone prioritário</span>
            <span><i class="dot green-dot"></i> Sistema online</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="clockbox">
        <div class="time" id="clock">10:35</div>
        <div class="date" id="dateText">Quarta-feira</div>
      </div>

      <div class="actions">
        <button class="action recreio" onclick="modoRecreio()">Recreio</button>
        <button class="action emergencia" onclick="modoEmergencia()">Aviso Emergência</button>
        <button class="action musica" onclick="musicaAmbiente()">Música Ambiente</button>
        <button class="action silenciar" onclick="silenciarTudo()">Silenciar</button>
      </div>
    </div>
  </div>

  <script>
    function atualizarRelogio(){
      const agora = new Date();
      const horas = String(agora.getHours()).padStart(2,'0');
      const minutos = String(agora.getMinutes()).padStart(2,'0');
      const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
      document.getElementById('clock').textContent = `${horas}:${minutos}`;
      document.getElementById('dateText').textContent = dias[agora.getDay()];
    }
    setInterval(atualizarRelogio,1000);
    atualizarRelogio();

    function limparEstados(){
      document.querySelectorAll('.zone').forEach(z=>{
        z.classList.remove('active-music','active-mic');
        z.dataset.state = '';
      });
      atualizarStats();
    }

    function toggleZone(el, tipo){
      if(tipo === 'music'){
        if(el.dataset.state === 'music'){
          el.classList.remove('active-music');
          el.dataset.state = '';
        } else {
          el.classList.remove('active-mic');
          el.classList.add('active-music');
          el.dataset.state = 'music';
        }
      }
      if(tipo === 'mic'){
        if(el.dataset.state === 'mic'){
          el.classList.remove('active-mic');
          el.dataset.state = '';
        } else {
          el.classList.remove('active-music');
          el.classList.add('active-mic');
          el.dataset.state = 'mic';
        }
      }
      if(tipo === 'bell'){
        el.classList.add('active-music');
        el.dataset.state = 'music';
      }
      atualizarStats();
    }

    function atualizarStats(){
      const music = document.querySelectorAll('.zone[data-state="music"]').length;
      const mic = document.querySelectorAll('.zone[data-state="mic"]').length;
      document.getElementById('statMusic').textContent = `Música: ${music} zonas`;
      document.getElementById('statMic').textContent = `Microfone: ${mic} zonas`;
    }

    function setScene(txt){
      document.getElementById('sceneText').textContent = `Modo: ${txt}`;
    }

    function modoRecreio(){
      limparEstados();
      ativar('patio','music');
      ativar('salas','music');
      ativar('entrada','music');
      setScene('Recreio');
    }

    function modoEmergencia(){
      limparEstados();
      document.querySelectorAll('.zone').forEach(z=>{
        z.classList.add('active-mic');
        z.dataset.state = 'mic';
      });
      setScene('Emergência');
      atualizarStats();
    }

    function musicaAmbiente(){
      limparEstados();
      ativar('salas','music');
      ativar('patio','music');
      ativar('auditorio','music');
      setScene('Música Ambiente');
    }

    function silenciarTudo(){
      limparEstados();
      setScene('Silenciado');
    }

    function acaoLateral(texto){
      setScene(texto);
    }

    function ativar(nome,tipo){
      const el = document.querySelector(`.zone[data-zone="${nome}"]`);
      if(!el) return;
      if(tipo === 'music'){
        el.classList.add('active-music');
        el.classList.remove('active-mic');
        el.dataset.state = 'music';
      }
      if(tipo === 'mic'){
        el.classList.add('active-mic');
        el.classList.remove('active-music');
        el.dataset.state = 'mic';
      }
      atualizarStats();
    }

    musicaAmbiente();
  </script>
</body>
</html>
