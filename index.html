<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariani Vision Control</title>

<style>
body{
  margin:0;
  background:#08111b;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:80px;
  background:#0b1f2f;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:10px;
}

.sidebar button{
  width:60px;
  height:60px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  background:#102a3d;
  color:white;
  font-size:20px;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:10px;
  background:#0e2a3d;
}

.viewer{
  flex:1;
  overflow:hidden;
  touch-action:none;
  position:relative;
}

#canvas{
  position:absolute;
  left:0;
  top:0;
  transform-origin:0 0;
}

#canvas img{
  width:1200px;
  display:block;
}

.zona{
  position:absolute;
  border:2px solid rgba(0,200,255,0.6);
  border-radius:8px;
}

.bottom{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#0e2a3d;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<button onclick="acao('radio')">📻</button>
<button onclick="acao('campainha')">🔔</button>
<button onclick="acao('mic')">🎤</button>
<button onclick="emergencia()">🚨</button>
</div>

<div class="main">

<div class="header">
<h3>Mariani Vision Control</h3>
</div>

<div class="viewer" id="viewer">
<div id="canvas">
<img src="terreo.png">

<!-- ZONAS -->
<div class="zona" style="left:80px; top:120px; width:200px; height:150px;"></div>
<div class="zona" style="left:300px; top:120px; width:200px; height:150px;"></div>
<div class="zona" style="left:520px; top:120px; width:200px; height:150px;"></div>
<div class="zona" style="left:740px; top:120px; width:200px; height:150px;"></div>

</div>
</div>

<div class="bottom">
<button onclick="acao('radio')">Rádio</button>
<button onclick="acao('campainha')">Campainha</button>
<button onclick="acao('mic')">Mic</button>
<button onclick="emergencia()">Emergência</button>
</div>

</div>
</div>

<script>

let scale = 1;
let posX = 0;
let posY = 0;

const canvas = document.getElementById("canvas");
const viewer = document.getElementById("viewer");

let startX, startY;
let isDragging = false;

// DRAG
viewer.addEventListener("mousedown", e=>{
  isDragging=true;
  startX=e.clientX - posX;
  startY=e.clientY - posY;
});

viewer.addEventListener("mousemove", e=>{
  if(!isDragging) return;
  posX = e.clientX - startX;
  posY = e.clientY - startY;
  atualizar();
});

viewer.addEventListener("mouseup", ()=> isDragging=false);

// TOUCH (arrastar)
viewer.addEventListener("touchmove", e=>{
  if(e.touches.length==1){
    posX += e.touches[0].movementX || 0;
    posY += e.touches[0].movementY || 0;
    atualizar();
  }
});

// ZOOM COM DOIS DEDOS
let lastDist = 0;

viewer.addEventListener("touchmove", e=>{
  if(e.touches.length==2){
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx+dy*dy);

    if(lastDist){
      let diff = dist - lastDist;
      scale += diff * 0.005;
      scale = Math.max(0.5, Math.min(scale, 3));
      atualizar();
    }

    lastDist = dist;
  }
});

viewer.addEventListener("touchend", ()=> lastDist=0);

function atualizar(){
  canvas.style.transform =
    `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// FUNÇÕES
function acao(nome){
  falar(nome + " ativado");
}

function emergencia(){
  falar("Emergência detectada evacuar o local");
  document.body.style.background="red";
}

function falar(txt){
  let msg = new SpeechSynthesisUtterance(txt);
  msg.lang="pt-BR";
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
