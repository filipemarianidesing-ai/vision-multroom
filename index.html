<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ética Vision Control PRO</title><style>

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
  background:#0b0f14;
  color:#fff;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:280px;
  background:linear-gradient(180deg,#0f1720,#0b0f14);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  padding:18px;
  border-radius:14px;
  background:#141c25;
  cursor:pointer;
  text-align:left;
  font-weight:600;
  transition:.2s;
}

.btn:hover{
  background:#1c2631;
  transform:scale(1.02);
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:20px;
  gap:10px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{
  display:flex;
  gap:10px;
}

.chip{
  padding:8px 14px;
  border-radius:999px;
  background:#141c25;
  font-size:12px;
}

.map-area{
  flex:1;
  background:#0e141b;
  border-radius:20px;
  position:relative;
  overflow:hidden;
}

.plan{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  transition:.3s;
}

.plan img{
  width:1200px;
}

.zone{
  position:absolute;
  border-radius:12px;
  transition:.3s;
}

.zone.active{
  animation:pulse 1.5s infinite;
}

.zone.blue{background:rgba(37,99,235,.3);}
.zone.green{background:rgba(34,197,94,.3);}
.zone.purple{background:rgba(168,85,247,.3);}
.zone.red{background:rgba(239,68,68,.3);}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}

.controls{
  display:flex;
  gap:10px;
}

.control-btn{
  flex:1;
  padding:16px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.control-btn:hover{transform:scale(1.05)}

.blue{background:#2563eb}
.green{background:#22c55e}
.purple{background:#a855f7}
.red{background:#ef4444}
.gray{background:#6b7280}

</style></head><body><div class="container"><div class="sidebar">
<div class="btn">🔔 Campainha</div>
<div class="btn">💬 Mensagens</div>
<div class="btn">📻 Rádio Escola</div>
<div class="btn">⏰ Horários</div>
</div><div class="main"><div class="topbar">
<h2>Ética Vision Control PRO</h2>
<div class="status">
<div class="chip">Sistema Online</div>
<div class="chip" id="scene">Modo Normal</div>
</div>
</div><div class="map-area" id="map"><div class="plan" id="plan">
<img src="terreo.png"><div class="zone" style="left:10%;top:20%;width:15%;height:20%"></div>
<div class="zone" style="left:30%;top:20%;width:15%;height:20%"></div>
<div class="zone" style="left:50%;top:20%;width:15%;height:20%"></div></div></div><div class="controls">
<div class="control-btn blue" onclick="setMode('blue')">🎵 Música</div>
<div class="control-btn green" onclick="setMode('green')">🔔 Campainha</div>
<div class="control-btn purple" onclick="setMode('purple')">🎤 Microfone</div>
<div class="control-btn red" onclick="setMode('red')">🚨 Emergência</div>
<div class="control-btn gray" onclick="setMode('off')">🔇 Silenciar</div>
</div></div>
</div><script>

let currentMode = 'off'

function setMode(mode){
  currentMode = mode
  document.getElementById('scene').innerText = mode.toUpperCase()

  document.querySelectorAll('.zone').forEach(z=>{
    z.className = 'zone'
    if(mode !== 'off'){
      z.classList.add(mode)
      z.classList.add('active')
    }
  })
}

</script></body>
</html>
