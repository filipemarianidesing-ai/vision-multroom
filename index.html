<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariani Vision Control</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:90px;
  height:100%;
  background:#111c2e;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:20px;
}

.btn{
  width:70px;
  height:70px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  background:#1e2a3f;
}

/* MAIN */
.main{
  margin-left:100px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  background:#111c2e;
  display:flex;
  justify-content:space-between;
}

/* VIEW */
.view{
  flex:1;
  position:relative;
  overflow:hidden;
}

/* STAGE */
#stage{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(0.7);
  transform-origin:center;
}

/* PLANTA */
#planta{
  width:1400px;
}

/* ZONAS */
.zona{
  position:absolute;
  border:2px solid rgba(0,200,255,0.6);
  border-radius:12px;
}

/* BOTÕES */
.controls{
  display:flex;
  gap:10px;
  padding:10px;
  background:#111c2e;
}

.control{
  flex:1;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.radio{background:#0066ff;}
.campainha{background:#00aa55;}
.microfone{background:#7a2cff;}
.emergencia{background:#ff0033;}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="btn">📻</div>
  <div class="btn">🔔</div>
  <div class="btn">🎤</div>
  <div class="btn">🚨</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div><b>MARIANI VISION CONTROL</b></div>
    <div>Sistema online</div>
  </div>

  <!-- VIEW -->
  <div class="view" id="view">

    <div id="stage">
      <img id="planta" src="terreo.png">

      <!-- ZONAS -->
      <div class="zona" style="left:100px;top:200px;width:200px;height:150px;" onclick="clickZona('Sala 01')"></div>
      <div class="zona" style="left:400px;top:150px;width:300px;height:200px;" onclick="clickZona('Pátio')"></div>
      <div class="zona" style="left:600px;top:500px;width:200px;height:150px;" onclick="clickZona('Biblioteca')"></div>

    </div>

  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <div class="control radio" onclick="acao('radio')">Rádio</div>
    <div class="control campainha" onclick="acao('campainha')">Campainha</div>
    <div class="control microfone" onclick="acao('mic')">Microfone</div>
    <div class="control emergencia" onclick="acao('emergencia')">Emergência</div>
  </div>

</div>

<script>

let stage = document.getElementById("stage");

let scale = 0.7;
let posX = 0;
let posY = 0;

let lastX, lastY;
let isDragging = false;

/* DRAG */
stage.addEventListener("touchstart",(e)=>{
  isDragging=true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

stage.addEventListener("touchmove",(e)=>{
  if(e.touches.length==1){
    let dx = e.touches[0].clientX - lastX;
    let dy = e.touches[0].clientY - lastY;

    posX += dx;
    posY += dy;

    update();

    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});

/* ZOOM */
stage.addEventListener("touchmove",(e)=>{
  if(e.touches.length==2){
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(window.lastDist){
      scale += (dist - window.lastDist)/300;
      scale = Math.max(0.5, Math.min(scale, 2));
      update();
    }

    window.lastDist = dist;
  }
});

/* UPDATE */
function update(){
  stage.style.transform =
    `translate(-50%,-50%) translate(${posX}px,${posY}px) scale(${scale})`;
}

/* CLICK ZONA */
function clickZona(nome){
  alert("Selecionado: "+nome);
}

/* AÇÕES */
function acao(tipo){
  alert("Ativou: "+tipo);
}

</script>

</body>
</html>x
